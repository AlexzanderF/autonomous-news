# Nginx configuration for serving thumbnails and proxying to services

# Upstream services
upstream fastapi_backend {
    server fastapi:8000;
}

upstream nextjs_frontend {
    server nextjs:3000;
}

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Serve thumbnail images directly from filesystem
    # URL: /thumbnails/article_123_abc123.jpg -> /data/thumbnails/article_123_abc123.jpg
    location /thumbnails/ {
        alias /data/thumbnails/;
        
        # Only allow image file types
        location ~* \.(jpg|jpeg|png|gif|webp|svg)$ {
            # Cache headers - cache for 7 days
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            
            # Enable gzip for SVGs
            gzip on;
            gzip_types image/svg+xml;
        }
        
        # Block access to non-image files
        location ~* \.(?!jpg|jpeg|png|gif|webp|svg).+$ {
            return 403;
        }
    }

    # Proxy API requests to FastAPI backend
    location /api/ {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Proxy all other requests to Next.js frontend
    location / {
        proxy_pass http://nextjs_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
