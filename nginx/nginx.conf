# Nginx configuration for serving thumbnails and proxying to services

# Upstream services
upstream fastapi_backend {
    server fastapi:8000;
}

upstream nextjs_frontend {
    server nextjs:3000;
}

# Rate Limiting Zones
# limit_req_zone defines the parameters for rate limiting
# $binary_remote_addr uses the client IP (4 bytes for IPv4)
# zone=api_limit:10m allocates 10MB for storage (approx 160,000 IPs)
# rate=10r/s allows 10 requests per second on average
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=15r/s;

# General zone for other pages
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=20r/s;

# Authorization Mapping
# Checks the 'access_key' query parameter
map $arg_access_key $authorized_by_key {
    "sEcr3t_K3y" 1;
    default 0;
}

# Checks the 'access_key' cookie
map $cookie_access_key $authorized_by_cookie {
    "sEcr3t_K3y" 1;
    default 0;
}

# Map for setting the cookie header if the key matches
map $arg_access_key $access_cookie_header {
    "sEcr3t_K3y" "access_key=sEcr3t_K3y; Path=/; HttpOnly; SameSite=Lax; Max-Age=31536000";
    default "";
}

# HTTP server - Redirect to HTTPS (and non-www to www)
server {
    listen 80;
    server_name macroglance.com www.macroglance.com;

    # ACME challenge for Let's Encrypt certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health check endpoint (keep accessible on HTTP for Docker)
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Redirect all HTTP traffic to HTTPS www
    location / {
        return 301 https://www.macroglance.com$request_uri;
    }
}

# HTTPS server - Redirect non-www to www
server {
    listen 443 ssl;
    http2 on;
    server_name macroglance.com;

    # SSL Certificate paths (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/macroglance.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/macroglance.com/privkey.pem;

    # Redirect to www
    return 301 https://www.macroglance.com$request_uri;
}

# HTTPS server - Main configuration (www)
server {
    listen 443 ssl;
    http2 on;
    server_name www.macroglance.com;

    # SSL Certificate paths (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/macroglance.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/macroglance.com/privkey.pem;

    # SSL Security settings
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    # Modern TLS configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (uncomment after confirming SSL works - 1 year)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Authorization logic
    set $is_authorized 0;
    if ($authorized_by_key) {
        set $is_authorized 1;
    }
    if ($authorized_by_cookie) {
        set $is_authorized 1;
    }

    # Always allow thumbnails/static files to load
    if ($uri ~ ^/thumbnails/) {
        set $is_authorized 1;
    }

    # Return 404 if not authorized (the "Trap")
    if ($is_authorized = 0) {
        return 404;
    }

    # Set the persistence cookie if authorized by key (with Secure flag for HTTPS)
    set $secure_cookie "";
    if ($access_cookie_header != "") {
        set $secure_cookie "access_key=sEcr3t_K3y; Path=/; HttpOnly; SameSite=Lax; Secure; Max-Age=31536000";
    }
    add_header Set-Cookie $secure_cookie always;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Serve thumbnail images directly from filesystem
    # URL: /thumbnails/article_123_abc123.jpg -> /data/thumbnails/article_123_abc123.jpg
    location /thumbnails/ {
        alias /data/thumbnails/;
        
        # Apply general rate limit (generous for assets)
        limit_req zone=general_limit burst=50 nodelay;
        
        # Only allow image file types
        location ~* \.(jpg|jpeg|png|gif|webp|svg)$ {
            # Cache headers - cache for 7 days
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            
            # Enable gzip for SVGs
            gzip on;
            gzip_types image/svg+xml;
        }
        
        # Block access to non-image files
        location ~* \.(?!jpg|jpeg|png|gif|webp|svg).+$ {
            return 403;
        }
    }

    # Proxy API requests to FastAPI backend
    location /api/ {
        # Apply API rate limit
        # burst=20 allows short bursts of traffic (e.g. initial page load)
        # nodelay ensures requests within the burst are served immediately
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Proxy all other requests to Next.js frontend
    location / {
        # Apply general rate limit
        limit_req zone=general_limit burst=50 nodelay;
        limit_req_status 429;
        
        proxy_pass http://nextjs_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Custom 429 Error Page (Optional - returning JSON for API consistency or simple text)
    error_page 429 = @429_json;
    location @429_json {
        return 429 '{"error": "Too Many Requests", "message": "You have exceeded the rate limit. Please try again later."}';
        add_header Content-Type application/json;
    }
}
