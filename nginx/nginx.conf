# Nginx configuration for serving thumbnails and proxying to services

# Upstream services
upstream fastapi_backend {
    server fastapi:8000;
}

upstream nextjs_frontend {
    server nextjs:3000;
}

# Rate Limiting Zones
# limit_req_zone defines the parameters for rate limiting
# $binary_remote_addr uses the client IP (4 bytes for IPv4)
# zone=api_limit:10m allocates 10MB for storage (approx 160,000 IPs)
# rate=10r/s allows 10 requests per second on average
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=15r/s;

# General zone for other pages
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=20r/s;

server {
    listen 80;
    server_name _;

    # Basic Auth - Restricted Access for Beta
    auth_basic "Restricted Access";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Serve thumbnail images directly from filesystem
    # URL: /thumbnails/article_123_abc123.jpg -> /data/thumbnails/article_123_abc123.jpg
    location /thumbnails/ {
        alias /data/thumbnails/;
        
        # Apply general rate limit (generous for assets)
        limit_req zone=general_limit burst=50 nodelay;
        
        # Only allow image file types
        location ~* \.(jpg|jpeg|png|gif|webp|svg)$ {
            # Cache headers - cache for 7 days
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
            add_header X-Content-Type-Options "nosniff" always;
            
            # Enable gzip for SVGs
            gzip on;
            gzip_types image/svg+xml;
        }
        
        # Block access to non-image files
        location ~* \.(?!jpg|jpeg|png|gif|webp|svg).+$ {
            return 403;
        }
    }

    # Proxy API requests to FastAPI backend
    location /api/ {
        # Apply API rate limit
        # burst=20 allows short bursts of traffic (e.g. initial page load)
        # nodelay ensures requests within the burst are served immediately
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Proxy all other requests to Next.js frontend
    location / {
        # Apply general rate limit
        limit_req zone=general_limit burst=50 nodelay;
        limit_req_status 429;
        
        proxy_pass http://nextjs_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Custom 429 Error Page (Optional - returning JSON for API consistency or simple text)
    error_page 429 = @429_json;
    location @429_json {
        return 429 '{"error": "Too Many Requests", "message": "You have exceeded the rate limit. Please try again later."}';
        add_header Content-Type application/json;
    }

    # Health check endpoint
    location /nginx-health {
        auth_basic off;
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
