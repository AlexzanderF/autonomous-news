version: "3.9"

services:
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /data/thumbnails:/data/thumbnails:ro
    depends_on:
      - fastapi
      - nextjs
    networks:
      - devnet

  postgres:
    image: postgres:17
    container_name: postgres
    restart: always
    env_file: .env
    volumes:
      - /data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - devnet

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - /data/redis:/data
    ports:
      - "6379:6379"
    networks:
      - devnet

  celery-worker:
    build:
      context: ./backend
      dockerfile: news_generation_workers/Dockerfile.celery
    container_name: celery-worker
    env_file: .env
    restart: unless-stopped
    command: celery -A celery_config worker --loglevel=info --concurrency=1
    volumes:
      - ./backend/news_generation_workers:/app/news_generation_workers
      - ./backend/db:/app/db
      - ./backend/services:/app/services
      - /data/thumbnails:/data/thumbnails
    depends_on:
      - redis
      - postgres
    networks:
      - devnet

  celery-beat:
    build:
      context: ./backend
      dockerfile: news_generation_workers/Dockerfile.celery
    container_name: celery-beat
    env_file: .env
    restart: unless-stopped
    command: celery -A celery_config beat --loglevel=info
    volumes:
      - ./backend/news_generation_workers:/app/news_generation_workers
      - ./backend/db:/app/db
      - ./backend/services:/app/services
    depends_on:
      - redis
    networks:
      - devnet

  celery-flower:
    image: mher/flower
    container_name: celery-flower
    env_file: .env
    command: celery --broker=redis://redis:6379/0 --result-backend=redis://redis:6379/0 flower --port=5555
    ports:
      - "5555:5555"
    networks:
      - devnet

  fastapi:
    build:
      context: ./backend
      dockerfile: api/Dockerfile
    container_name: fastapi
    restart: unless-stopped
    env_file: .env
    environment:
      - PORT=8000
      - FRONTEND_URL=http://nextjs:3000
    # Port only exposed internally, nginx proxies to it
    expose:
      - "8000"
    volumes:
      - ./backend/api:/app/api
      - ./backend/db:/app/db
    depends_on:
      - postgres
      - redis
    networks:
      - devnet

  nextjs:
    build:
      context: ./nextjs
      dockerfile: Dockerfile
    container_name: nextjs
    restart: unless-stopped
    env_file: .env
    environment:
      - NEXT_PUBLIC_API_BASE_URL=/api
    # Port only exposed internally, nginx proxies to it
    expose:
      - "3000"
    depends_on:
      - fastapi
    networks:
      - devnet

networks:
  devnet:
    driver: bridge  